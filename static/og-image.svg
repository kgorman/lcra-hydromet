<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#060912"/>
      <stop offset="100%" stop-color="#0a1428"/>
    </linearGradient>
    <radialGradient id="orb1" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#1e3a8a" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#1e3a8a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb2" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#0e7490" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#0e7490" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb3" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#6d28d9" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#6d28d9" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="logoGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5ec8f7"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#93a4c8"/>
    </linearGradient>
    <linearGradient id="fillBlue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5ec8f7"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="fillGreen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#0e7490"/>
    </linearGradient>
    <linearGradient id="fillAmber" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <ellipse cx="120" cy="80" rx="420" ry="320" fill="url(#orb1)"/>
  <ellipse cx="1100" cy="120" rx="380" ry="260" fill="url(#orb2)"/>
  <ellipse cx="300" cy="600" rx="320" ry="240" fill="url(#orb3)"/>

  <!-- subtle grid -->
  <g stroke="rgba(120, 160, 220, 0.06)" stroke-width="1">
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="470" x2="1200" y2="470"/>
  </g>

  <!-- top bar: logo + brand + LIVE badge -->
  <g transform="translate(60, 56)">
    <!-- water drop logo -->
    <path d="M28 6 C 14 28, 10 38, 28 50 C 46 38, 42 28, 28 6 Z" fill="url(#logoGrad)"/>
    <text x="76" y="20" fill="#93a4c8" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" font-weight="500" letter-spacing="3">
      LOWER COLORADO RIVER AUTHORITY
    </text>
    <text x="76" y="46" fill="#e6ecff" font-family="-apple-system, 'Inter', system-ui, sans-serif" font-size="22" font-weight="700">
      Hydromet · Live
    </text>
  </g>

  <!-- LIVE pill -->
  <g transform="translate(1010, 56)">
    <rect x="0" y="0" width="130" height="44" rx="22" fill="rgba(52, 211, 153, 0.14)" stroke="rgba(52, 211, 153, 0.55)" stroke-width="1"/>
    <circle cx="22" cy="22" r="6" fill="#34d399"/>
    <circle cx="22" cy="22" r="11" fill="#34d399" fill-opacity="0.18"/>
    <text x="40" y="28" fill="#34d399" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="14" font-weight="700" letter-spacing="2">
      LIVE · 60s
    </text>
  </g>

  <!-- title block -->
  <g transform="translate(60, 195)">
    <text x="0" y="0" fill="#5ec8f7" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="14" font-weight="600" letter-spacing="4">
      HIGHLAND LAKES · DAM OPERATIONS · RAINFALL
    </text>
    <text x="0" y="84" fill="url(#titleGrad)" font-family="-apple-system, 'Inter', system-ui, sans-serif" font-size="86" font-weight="800" letter-spacing="-2">
      LCRA Hydromet
    </text>
    <text x="0" y="138" fill="#93a4c8" font-family="-apple-system, 'Inter', system-ui, sans-serif" font-size="26" font-weight="400" letter-spacing="-0.5">
      Real-time water levels for the Colorado River basin.
    </text>
  </g>

  <!-- Highland Lakes mini-chain (stylized 6 tiles + flow arrows) -->
  <g transform="translate(60, 420)">
    <!-- Tile dimensions: 6 lakes across 1080px wide -->
    <!-- Each tile 150 wide, 24 gutter -->
    <g font-family="-apple-system, 'Inter', system-ui, sans-serif">
      <!-- Lake Buchanan -->
      <g transform="translate(0, 0)">
        <rect x="0" y="0" width="150" height="160" rx="14" fill="rgba(11, 18, 36, 0.7)" stroke="rgba(120, 160, 220, 0.28)"/>
        <rect x="0" y="0" width="4" height="160" fill="url(#fillAmber)"/>
        <text x="14" y="26" fill="#93a4c8" font-size="10" font-weight="600" letter-spacing="2">BUCHANAN</text>
        <text x="14" y="64" fill="#e6ecff" font-family="ui-monospace, monospace" font-size="26" font-weight="600">1019.8</text>
        <text x="14" y="80" fill="#5e6e93" font-family="ui-monospace, monospace" font-size="10">ft MSL</text>
        <!-- fill bar -->
        <rect x="116" y="70" width="20" height="70" rx="4" fill="rgba(255,255,255,0.05)"/>
        <rect x="116" y="80" width="20" height="60" rx="4" fill="url(#fillAmber)" opacity="0.85"/>
        <text x="14" y="138" fill="#fbbf24" font-family="ui-monospace, monospace" font-size="11">99.7% · cons</text>
      </g>
      <!-- Lake Inks -->
      <g transform="translate(174, 0)">
        <rect x="0" y="0" width="150" height="160" rx="14" fill="rgba(11, 18, 36, 0.7)" stroke="rgba(120, 160, 220, 0.28)"/>
        <rect x="0" y="0" width="4" height="160" fill="url(#fillBlue)"/>
        <text x="14" y="26" fill="#93a4c8" font-size="10" font-weight="600" letter-spacing="2">INKS</text>
        <text x="14" y="64" fill="#e6ecff" font-family="ui-monospace, monospace" font-size="26" font-weight="600">887.0</text>
        <text x="14" y="80" fill="#5e6e93" font-family="ui-monospace, monospace" font-size="10">ft MSL</text>
        <rect x="116" y="70" width="20" height="70" rx="4" fill="rgba(255,255,255,0.05)"/>
        <rect x="116" y="92" width="20" height="48" rx="4" fill="url(#fillBlue)" opacity="0.85"/>
        <text x="14" y="138" fill="#5ec8f7" font-family="ui-monospace, monospace" font-size="11">pass-through</text>
      </g>
      <!-- Lake LBJ -->
      <g transform="translate(348, 0)">
        <rect x="0" y="0" width="150" height="160" rx="14" fill="rgba(11, 18, 36, 0.7)" stroke="rgba(120, 160, 220, 0.28)"/>
        <rect x="0" y="0" width="4" height="160" fill="url(#fillBlue)"/>
        <text x="14" y="26" fill="#93a4c8" font-size="10" font-weight="600" letter-spacing="2">LBJ</text>
        <text x="14" y="64" fill="#e6ecff" font-family="ui-monospace, monospace" font-size="26" font-weight="600">824.5</text>
        <text x="14" y="80" fill="#5e6e93" font-family="ui-monospace, monospace" font-size="10">ft MSL</text>
        <rect x="116" y="70" width="20" height="70" rx="4" fill="rgba(255,255,255,0.05)"/>
        <rect x="116" y="88" width="20" height="52" rx="4" fill="url(#fillBlue)" opacity="0.85"/>
        <text x="14" y="138" fill="#5ec8f7" font-family="ui-monospace, monospace" font-size="11">pass-through</text>
      </g>
      <!-- Marble Falls -->
      <g transform="translate(522, 0)">
        <rect x="0" y="0" width="150" height="160" rx="14" fill="rgba(11, 18, 36, 0.7)" stroke="rgba(120, 160, 220, 0.28)"/>
        <rect x="0" y="0" width="4" height="160" fill="url(#fillBlue)"/>
        <text x="14" y="26" fill="#93a4c8" font-size="10" font-weight="600" letter-spacing="2">MARBLE FALLS</text>
        <text x="14" y="64" fill="#e6ecff" font-family="ui-monospace, monospace" font-size="26" font-weight="600">735.9</text>
        <text x="14" y="80" fill="#5e6e93" font-family="ui-monospace, monospace" font-size="10">ft MSL</text>
        <rect x="116" y="70" width="20" height="70" rx="4" fill="rgba(255,255,255,0.05)"/>
        <rect x="116" y="92" width="20" height="48" rx="4" fill="url(#fillBlue)" opacity="0.85"/>
        <text x="14" y="138" fill="#5ec8f7" font-family="ui-monospace, monospace" font-size="11">pass-through</text>
      </g>
      <!-- Travis -->
      <g transform="translate(696, 0)">
        <rect x="0" y="0" width="150" height="160" rx="14" fill="rgba(11, 18, 36, 0.7)" stroke="rgba(120, 160, 220, 0.28)"/>
        <rect x="0" y="0" width="4" height="160" fill="url(#fillGreen)"/>
        <text x="14" y="26" fill="#93a4c8" font-size="10" font-weight="600" letter-spacing="2">TRAVIS</text>
        <text x="14" y="64" fill="#e6ecff" font-family="ui-monospace, monospace" font-size="26" font-weight="600">671.2</text>
        <text x="14" y="80" fill="#5e6e93" font-family="ui-monospace, monospace" font-size="10">ft MSL</text>
        <rect x="116" y="70" width="20" height="70" rx="4" fill="rgba(255,255,255,0.05)"/>
        <rect x="116" y="102" width="20" height="38" rx="4" fill="url(#fillGreen)" opacity="0.85"/>
        <text x="14" y="138" fill="#34d399" font-family="ui-monospace, monospace" font-size="11">53.8% · range</text>
      </g>
      <!-- Austin -->
      <g transform="translate(870, 0)">
        <rect x="0" y="0" width="150" height="160" rx="14" fill="rgba(11, 18, 36, 0.7)" stroke="rgba(120, 160, 220, 0.28)"/>
        <rect x="0" y="0" width="4" height="160" fill="url(#fillBlue)"/>
        <text x="14" y="26" fill="#93a4c8" font-size="10" font-weight="600" letter-spacing="2">AUSTIN</text>
        <text x="14" y="64" fill="#e6ecff" font-family="ui-monospace, monospace" font-size="26" font-weight="600">492.0</text>
        <text x="14" y="80" fill="#5e6e93" font-family="ui-monospace, monospace" font-size="10">ft MSL</text>
        <rect x="116" y="70" width="20" height="70" rx="4" fill="rgba(255,255,255,0.05)"/>
        <rect x="116" y="86" width="20" height="54" rx="4" fill="url(#fillBlue)" opacity="0.85"/>
        <text x="14" y="138" fill="#5ec8f7" font-family="ui-monospace, monospace" font-size="11">pass-through</text>
      </g>
    </g>
    <!-- flow connectors -->
    <g stroke="#5ec8f7" stroke-width="2" fill="none" opacity="0.55" stroke-dasharray="6 6">
      <path d="M 150 80 C 162 76, 162 84, 174 80"/>
      <path d="M 324 80 C 336 76, 336 84, 348 80"/>
      <path d="M 498 80 C 510 76, 510 84, 522 80"/>
      <path d="M 672 80 C 684 76, 684 84, 696 80"/>
      <path d="M 846 80 C 858 76, 858 84, 870 80"/>
    </g>
    <g fill="#5ec8f7" opacity="0.85">
      <path d="M 168 76 L 174 80 L 168 84 Z"/>
      <path d="M 342 76 L 348 80 L 342 84 Z"/>
      <path d="M 516 76 L 522 80 L 516 84 Z"/>
      <path d="M 690 76 L 696 80 L 690 84 Z"/>
      <path d="M 864 76 L 870 80 L 864 84 Z"/>
    </g>
  </g>

  <!-- footer -->
  <g transform="translate(60, 596)" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12">
    <text x="0" y="0" fill="#5e6e93">
      Built with D3.js · FastAPI · hydromet.lcra.org
    </text>
    <text x="1080" y="0" fill="#5e6e93" text-anchor="end">
      lcra-hydromet.onrender.com
    </text>
  </g>
</svg>
